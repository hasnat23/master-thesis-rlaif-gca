# Reward/factuality judge configuration for preference elicitation
# NOTE: GPT-4o has been replaced by a fixed deterministic reward model.
# The build_reward_preferences.py script accepts --model-name via CLI and
# does NOT read this config file. Values here are for documentation only.

# Judge model (deterministic sequence-classification, no LLM API)
judge_model: "CogComp/bart-faithful-summary-detector"

# Preference construction settings
tie_margin: 0.05               # min score difference to produce a preference
gca_alpha: 0.5                 # exponent in GCA aggregation formula
mode: "both"                   # holistic | gca | both

# Input/output paths (relative to project root)
candidates_path: "data/candidates/candidates_200.jsonl"
output_dir_holistic: "data/preferences"
output_dir_gca: "data/preferences"

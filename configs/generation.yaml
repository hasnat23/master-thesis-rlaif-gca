# Candidate summary generation configuration

# Model to use for candidate generation
# Mistral-7B-Instruct-v0.3 — instruction-tuned 7B, Apache 2.0 license
# Stored locally on MOGON at: ~/thesis/models/Mistral-7B-Instruct-v0.3
model_name: "models/Mistral-7B-Instruct-v0.3"

# Tokenizer settings
max_input_length: 1024
max_new_tokens: 256
padding_side: "left"  # Required for decoder-only models

# Generation strategy: two candidates per article with different temperatures
candidates_per_article: 2
generation_configs:
  - name: "low_temp"
    temperature: 0.7
    top_p: 0.9
    do_sample: true
  - name: "high_temp"
    temperature: 1.0
    top_p: 0.95
    do_sample: true

# Batching
batch_size: 4

# Quantization for inference (4-bit via bitsandbytes)
load_in_4bit: false

# Input/output paths (relative to project root)
subset_path: "data/subset/subset_200.jsonl"
output_dir: "data/candidates"
output_filename: "candidates_200.jsonl"

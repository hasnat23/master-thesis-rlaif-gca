# CNN/DailyMail subset for 1000-sample expanded experiment
#
# Uses seed=200 (distinct from seed=42 for DPO set and seed=100 for rm500 set)
# to ensure no overlap between the three experiment sets.
# All three pull from the test split (11,490 rows).

n_samples: 1000

seed: 200

split: "test"

local_dataset_path: "data/cnn_dailymail_500"

max_article_chars: 8000
max_summary_chars: 2000

output_dir: "data/subset"
output_filename: "subset_1000.jsonl"
